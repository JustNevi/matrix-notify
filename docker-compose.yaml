services:
  matrix-notify:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./files/backup/:/opt/matrix-notify/files/backup/
    environment:
      BACKUP_PATH: ${BACKUP_PATH}  
      HOMESERVER: ${HOMESERVER}  
      USER_ID: ${USER_ID}  
      USER_PASS: ${USER_PASS}  
      ROOM_ID: ${ROOM_ID}  
